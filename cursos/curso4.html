    <h1>Curso 4</h1>
    <h2>Semestre 1</h2>
    <div class="seccion-curso">
        <h2>Control de Notas</h2>
        <table class="tabla-notas" id="miTabla">
            <thead>
                <tr>
                    <th>Actividad</th>
                    <th>Porcentaje (%)</th>
                    <th>Nota (0-10)</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="text" class="nombre-input" value="Examen"></td>
                    <td><input type="number" class="pct-input" value="50" min="0" max="100"></td>
                    <td><input type="number" class="nota-input" value="0" min="0" max="10"></td>
                    <td><button class="btn-eliminar" onclick="eliminarFila(this)">❌</button></td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="4">
                        <button id="btn-nueva-fila">➕ Añadir Actividad</button>
                    </td>
                </tr>
                <tr class="nota-final">
                    <td colspan="2">Nota Final (Suma % debe ser 100)</td>
                    <td id="total-nota" colspan="2">0.00</td>
                </tr>
            </tfoot>
        </table>
        <p id="aviso-porcentaje" style="color: red;"></p>
    </div>
